safe_read_paths:
  - README.md
  - AGENTS.md
  - repo.meta.yaml
  - agent-policy.yaml
  - audit/
  - docs/

guarded_write_paths:
  - audit/
  - docs/
  - scripts/
  - src/
  - deploy/
  - .github/workflows/

forbidden_write_paths:
  - docs/_generated/
  - secrets/
  - snapshots/

requires_target_proof_for:
  - src/
  - deploy/
  - .github/workflows/

required_checks_before_patch:
  - repo-structure-guard
  - docs-relations-guard
  - generated-files-guard
  - check-drift-gates
  - lint
  - test

human_review_required_for:
  - security/
  - deploy/
  - credentials/
