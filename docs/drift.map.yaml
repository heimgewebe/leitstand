rules:
  - trigger: "scripts/vendor-contracts.mjs"
    require: "vendor/contracts/_pin.json"
    message: "Vendored Contracts Consistency"
  - trigger: "scripts/leitstand-release.py|deploy/systemd/leitstand.*service|deploy/systemd/runtime-config.example.json"
    require: "docs/runbooks/local-release-runtime.md"
    message: "Versioned user-systemd release contract"
  - trigger: "scripts/leitstand-up|deploy/docker-compose"
    require: "docs/runbooks/ops.runbook.leitstand-gateway.updates.md"
    message: "Optional Compose update contract"
