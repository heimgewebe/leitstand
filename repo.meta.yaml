repo_name: leitstand
repo_type: service
role: observer_digest_view_surface
status: active
summary: >
  Read-only observer, digest and view surface for the Heimgewebe operator ecosystem.

role_contract:
  name: observer_digest_view_surface
  authority: read_only_projection
  owns:
    - dashboards
    - digests
    - view_routes
  consumes:
    - chronik_events
    - bureau_state
    - plexer_delivery_reports
  produces:
    - rendered_views
    - daily_digests
  limits:
    - no_task_ownership
    - no_worker_execution
    - no_ledger_writes
  unavailable_effect: execution_truth_continues_without_leitstand

owners:
  - heimgewebe-team

primary_languages:
  - typescript
  - markdown

entrypoints:
  - README.md
  - AGENTS.md
  - docs/index.md

canonical_sources:
  - repo.meta.yaml
  - AGENTS.md
  - docs/index.md

discovery_roots:
  - docs/
  - src/
  - scripts/
  - tests/
  - audit/
  - deploy/
  - .github/workflows/

generated_artifacts:
  - docs/_generated/doc-index.md
  - docs/_generated/system-map.md
  - docs/_generated/orphans.md
  - docs/_generated/impl-index.md
  - docs/_generated/backlinks.md
  - docs/_generated/supersession-map.md
  - docs/_generated/agent-readiness.md

safe_read_paths:
  - README.md
  - AGENTS.md
  - repo.meta.yaml
  - agent-policy.yaml
  - audit/
  - docs/

guarded_write_paths:
  - audit/
  - docs/
  - scripts/
  - src/
  - deploy/
  - .github/workflows/

forbidden_write_paths:
  - docs/_generated/
  - secrets/
  - snapshots/

required_checks:
  - repo-structure-guard
  - docs-relations-guard
  - generated-files-guard
  - check-drift-gates
  - lint
  - test

indexing:
  enabled: true
  require_frontmatter_for_docs: true
  require_registry_for_critical_impl: true
  fail_on_untyped_docs: true
  fail_on_missing_doc_index: true
  fail_on_orphans: false
  fail_on_unmapped_critical_impl: false

related_repos:
  - metarepo
  - wgx
  - semantAH
  - chronik
  - hausKI
  - bureau
  - grabowski
  - plexer
  - heimlern

keywords:
  - dashboard
  - digest
  - read-only
  - observer
  - view-surface
  - agent-ready
