name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Enable Corepack
      run: |
        corepack enable
        corepack prepare pnpm@9.1.0 --activate

    - name: Use Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Lint
      if: success()
      run: pnpm run lint

    - name: Typecheck
      if: success()
      run: pnpm run typecheck

    - name: Test
      if: success()
      run: pnpm run test

    - name: Build
      if: success()
      run: pnpm run build

    - name: Repo Structure Guard
      if: success()
      run: bash scripts/ci/repo-structure-guard.sh

    - name: Docs Relations Guard
      if: success()
      run: bash scripts/ci/docs-relations-guard.sh

    - name: Generated Files Guard
      if: success()
      run: bash scripts/ci/generated-files-guard.sh

    - name: Drift Gates
      if: success()
      run: bash scripts/ci/check-drift-gates.sh
