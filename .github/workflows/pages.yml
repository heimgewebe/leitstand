# DEPLOYMENT MODE: bounded public static preview.
# The canonical Leitstand runtime is internal and is not represented by Pages.
name: Deploy to Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Enable Corepack
        run: |
          corepack enable
          corepack prepare pnpm@9.1.0 --activate

      - name: Setup Node
        uses: actions/setup-node@v4.1.0
        with:
          node-version: '20'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build bounded static preview
        run: pnpm build:cf

      - name: Verify static boundary
        run: node -e "const b=require('./dist/site/_static-boundary.json'); if (b.supportedRoutes.length !== 1 || b.supportedRoutes[0].route !== '/') process.exit(1)"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist/site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
